version: '3.8'

services:
  app:
    build: .
    container_name: school-management-app
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-school}
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - school-network

  mysql:
    image: mysql:8.0
    container_name: school-management-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-school}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    networks:
      - school-network

volumes:
  mysql-data:

networks:
  school-network:
    driver: bridge
